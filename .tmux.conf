set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Prefix + e: prompt for a file path and open in vim/nvim on a sibling pane.
bind-key e command-prompt -p "Open file:" "run-shell 'bash ~/.local/bin/tmux-open-file-pane \"%%\"'"
bind-key h select-window -t home
bind-key n select-window -t nav
